services:

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: nexchat-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      PORT: 5000

  ml:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: nexchat-ml
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      - ml_models:/app/models

volumes:
  ml_models: